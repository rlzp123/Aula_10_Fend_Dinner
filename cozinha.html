<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozinha - Dinner by Moonlight 🌙</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        retro: ['"Trebuchet MS"', 'sans-serif'],
                    },
                    colors: {
                        moon: '#561D86',  // Roxo escuro
                        neon: '#321250',  // Roxo mais profundo
                        cream: '#EC4899'  // Rosa vibrante
                    }
                }
            }
        }
    </script>
    <style>
        body {
            /* Fundo gradiente idêntico ao seu Hero */
            background: linear-gradient(to bottom right, #312e81, #581c87, #000);
            min-height: 100vh;
        }
        /* Cartão de pedido com desfoque de fundo idêntico à sua Navbar */
        .order-card {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(86, 29, 134, 0.5); /* Borda moon sutil */
        }
        /* Scrollbar customizada para não ficar feia no painel */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #561D86; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #EC4899; }
    </style>
</head>
<body class="font-retro text-white">

    <nav class="bg-black/40 backdrop-blur-md shadow-lg fixed w-full z-50 border-b border-moon/50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-cream tracking-widest uppercase">
                🌙 Painel Cozinha
            </h1>
            <div class="text-right flex items-center gap-4">
                <div class="text-sm text-gray-400 uppercase hidden md:block">Tempo Real</div>
                <div id="clock" class="text-2xl font-bold text-white bg-neon px-4 py-1 rounded-lg border border-moon">00:00:00</div>
            </div>
        </div>
    </nav>

    <main class="max-w-[95rem] mx-auto px-4 pt-28 pb-10">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 h-[calc(100vh-9rem)]">
            
            <div class="bg-black/20 rounded-2xl border border-red-900/50 flex flex-col overflow-hidden">
                <div class="p-4 bg-red-950/50 border-b border-red-900 flex justify-between items-center">
                    <h2 class="text-lg font-bold text-red-400 uppercase tracking-wider flex items-center gap-2">
                        <i class="fas fa-clock animate-pulse"></i> À Espera
                    </h2>
                    <span id="count-pending" class="text-2xl font-bold text-white bg-red-600 px-3 py-0.5 rounded-lg">0</span>
                </div>
                <div id="col-pending" class="p-4 space-y-4 overflow-y-auto flex-1">
                    </div>
            </div>

            <div class="bg-black/20 rounded-2xl border border-moon/50 flex flex-col overflow-hidden">
                <div class="p-4 bg-neon border-b border-moon flex justify-between items-center">
                    <h2 class="text-lg font-bold text-pink-300 uppercase tracking-wider flex items-center gap-2">
                        <i class="fas fa-fire-burner"></i> No Fogo
                    </h2>
                    <span id="count-preparing" class="text-2xl font-bold text-white bg-moon px-3 py-0.5 rounded-lg">0</span>
                </div>
                <div id="col-preparing" class="p-4 space-y-4 overflow-y-auto flex-1">
                    </div>
            </div>

            <div class="bg-black/20 rounded-2xl border border-cream/30 flex flex-col overflow-hidden">
                <div class="p-4 bg-pink-950/30 border-b border-cream/30 flex justify-between items-center">
                    <h2 class="text-lg font-bold text-cream uppercase tracking-wider flex items-center gap-2">
                        <i class="fas fa-check-circle"></i> Pronto
                    </h2>
                    <span id="count-ready" class="text-2xl font-bold text-white bg-cream px-3 py-0.5 rounded-lg">0</span>
                </div>
                <div id="col-ready" class="p-4 space-y-4 overflow-y-auto flex-1">
                    </div>
            </div>

        </div>
    </main>

    <script>
        // Dados de exemplo simulando a integração (com itens do seu cardápio)
        let orders = [
            { id: 101, table: "Mesa 03", time: "20:05", status: "pending", items: [
                { name: "DINER BURGER", qty: 2, obs: "Sem picles" },
                { name: "ITUBAÍNA", qty: 2, obs: "" }
            ]},
            { id: 102, table: "Mesa 05", time: "19:58", status: "preparing", items: [
                { name: "LUA BURGUER", qty: 1, obs: "Bacon extra" },
                { name: "LUA JUICE", qty: 1, obs: "" },
                { name: "WAFFLE NUTELLA", qty: 1, obs: "Enviar junto" }
            ]},
            { id: 103, table: "Mesa 01", time: "19:50", status: "ready", items: [
                { name: "JAMES DEAN BACON", qty: 1, obs: "" }
            ]},
             { id: 104, table: "Mesa 08", time: "20:10", status: "pending", items: [
                { name: "PETIT GATEAU", qty: 2, obs: "" }
            ]}
        ];

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('pt-BR');
        }
        setInterval(updateClock, 1000);
        updateClock();

        function renderOrders() {
            // Limpa as colunas
            const cols = {
                'pending': document.getElementById('col-pending'),
                'preparing': document.getElementById('col-preparing'),
                'ready': document.getElementById('col-ready')
            };
            Object.values(cols).forEach(col => col.innerHTML = '');

            // Renderiza cada card em sua coluna correspondente
            orders.forEach(order => {
                const cardHtml = `
                    <div class="order-card p-5 rounded-xl transition duration-300 hover:border-cream/50">
                        <div class="flex justify-between items-center mb-3 border-b border-gray-800 pb-3">
                            <div>
                                <h3 class="text-xl font-bold text-white uppercase tracking-tight">${order.table}</h3>
                                <p class="text-[10px] text-gray-500">ID: #${order.id} | Feito às: ${order.time}</p>
                            </div>
                            <i class="fas fa-ellipsis-v text-gray-600"></i>
                        </div>

                        <ul class="space-y-2 mb-5 text-sm">
                            ${order.items.map(item => `
                                <li>
                                    <div class="flex justify-between items-center bg-white/5 p-2 rounded">
                                        <span class="font-bold text-gray-100">${item.qty}x ${item.name}</span>
                                        <i class="fas fa-cookie-bite text-moon"></i>
                                    </div>
                                    ${item.obs ? `<p class="text-xs text-pink-300 italic mt-1 pl-2 border-l-2 border-pink-800">Obs: ${item.obs}</p>` : ''}
                                </li>
                            `).join('')}
                        </ul>

                        <div class="flex gap-2">
                            ${order.status === 'pending' ? `
                                <button onclick="updateStatus(${order.id}, 'preparing')" class="w-full bg-moon hover:bg-purple-700 text-white py-2.5 rounded-lg font-bold transition flex items-center justify-center gap-2 text-sm">
                                    <i class="fas fa-fire"></i> ACEITAR PREPARO
                                </button>
                            ` : ''}

                            ${order.status === 'preparing' ? `
                                <button onclick="updateStatus(${order.id}, 'ready')" class="w-full bg-cream hover:bg-pink-500 text-white py-2.5 rounded-lg font-bold transition flex items-center justify-center gap-2 text-sm">
                                    <i class="fas fa-check"></i> FINALIZAR PRATO
                                </button>
                            ` : ''}

                            ${order.status === 'ready' ? `
                                <button onclick="removeOrder(${order.id})" class="w-full bg-slate-700 hover:bg-slate-600 text-white py-2.5 rounded-lg font-bold transition flex items-center justify-center gap-2 text-sm">
                                    <i class="fas fa-concierge-bell"></i> ENTREGUE
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
                cols[order.status].innerHTML += cardHtml;
            });

            updateStats();
        }

        function updateStatus(id, newStatus) {
            const order = orders.find(o => o.id === id);
            if (order) {
                // Efeito sonoro sutil (opcional, requer interação prévia do usuário com a página)
                // new Audio('https://cdn.pixabay.com/audio/2022/03/15/audio_2e2938a39d.mp3').play();
                order.status = newStatus;
                renderOrders();
            }
        }

        function removeOrder(id) {
            orders = orders.filter(o => o.id !== id);
            renderOrders();
        }

        function updateStats() {
            document.getElementById('count-pending').innerText = orders.filter(o => o.status === 'pending').length;
            document.getElementById('count-preparing').innerText = orders.filter(o => o.status === 'preparing').length;
            document.getElementById('count-ready').innerText = orders.filter(o => o.status === 'ready').length;
        }

        renderOrders();
    </script>
</body>
</html>
